services:
  - type: web
    name: varadhi-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: varadhi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app

databases:
  - name: varadhi-db
    databaseName: varadhi_db
    user: varadhi_user
    plan: free
